<body class="flex flex-col h-screen overflow-hidden antialiased relative">
    
    <!-- メインコンテンツエリア -->
    <main class="flex-1 overflow-y-auto pb-24 relative" id="app-container">
        
        <!-- ==================== ホーム画面（レシピ一覧） ==================== -->
        <div id="view-home" class="view-transition active-view px-6 py-10 min-h-full max-w-2xl mx-auto">
            <header class="mb-10 flex justify-between items-center">
                <h1 class="text-2xl font-light tracking-wider text-gray-900">レシピ</h1>
            </header>
            
            <div id="recipe-list" class="space-y-4">
                <!-- Javascriptでリストを生成 -->
            </div>
        </div>

        <!-- ==================== 追加画面（URL入力） ==================== -->
        <div id="view-add" class="view-transition hidden-view px-6 py-10 min-h-full flex flex-col max-w-2xl mx-auto mt-10">
            <h1 class="text-2xl font-light tracking-wider mb-4 text-center">Create</h1>
            <p class="text-gray-400 text-sm mb-12 text-center font-light leading-relaxed">
                Paste the URL<br>
            </p>
            
            <div class="w-full max-w-md mx-auto relative flex flex-col items-center">
                <input type="url" id="url-input" placeholder="https://..." class="w-full bg-gray-50/50 border border-gray-100 rounded-2xl py-5 px-6 text-center text-lg font-light placeholder-gray-300 focus:bg-white focus:border-gray-200 focus:shadow-sm transition-all outline-none">
                
                <button id="extract-btn" class="mt-8 px-10 py-4 bg-gray-900 text-white rounded-full font-light tracking-widest hover:bg-gray-800 transition-all flex items-center justify-center gap-3 shadow-sm hover:shadow-md active:scale-95">
                    <span>Pick!</span>
                </button>

                <!-- ローディングインジケーター -->
                <div id="loading-indicator" class="hidden flex-col items-center mt-10 opacity-0 transition-opacity duration-300">
                    <div class="w-8 h-8 border-[1.5px] border-gray-100 border-t-gray-900 rounded-full animate-spin"></div>
                    <p class="text-xs text-gray-400 mt-4 tracking-widest font-light">Now Picking...</p>
                </div>
            </div>
        </div>

        <!-- ==================== 詳細画面（レシピ表示） ==================== -->
        <div id="view-detail" class="view-transition hidden-view px-6 py-8 min-h-full bg-white z-10 max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <button id="back-btn" class="text-gray-400 hover:text-gray-900 transition-colors flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="text-sm tracking-wider font-light">戻る</span>
                </button>
                <button id="delete-btn" class="text-gray-300 hover:text-red-400 transition-colors flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="recipe-detail-content" class="pb-10">
                <!-- Javascriptで詳細コンテンツを生成 -->
            </div>
        </div>

        <!-- ==================== 設定画面 ==================== -->
        <div id="view-settings" class="view-transition hidden-view px-6 py-10 min-h-full max-w-2xl mx-auto">
            <h1 class="text-2xl font-light tracking-wider mb-12 text-center">設定</h1>
            
            <div class="space-y-10">
                <div class="bg-gray-50/50 p-6 rounded-3xl border border-gray-100">
                    <label class="flex items-center gap-2 text-sm text-gray-600 mb-4 font-light tracking-wide">
                        <i data-lucide="key" class="w-4 h-4"></i>
                        Gemini API キー <span class="text-xs text-gray-400 font-normal ml-2">（オプション）</span>
                    </label>
                    <input type="password" id="api-key-input" placeholder="入力してAI連携" class="w-full bg-white border border-gray-200 rounded-xl py-3 px-4 focus:outline-none focus:border-gray-900 focus:shadow-sm font-light text-gray-800 transition-all mb-6">
                    
                    <button id="test-api-btn" class="w-full py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-light text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 shadow-sm active:scale-[0.98]">
                        <i data-lucide="check-circle" class="w-4 h-4"></i>
                        <span>AI接続テスト</span>
                    </button>

                    <p class="text-xs text-gray-400 mt-6 leading-relaxed font-light">
                        APIキー未設定時は、サイトの構造データから即座に抽出します（高速・無料）。<br>
                        読み取れないサイトがある場合は、ご自身のAPIキーを入力することで、AIが柔軟に抽出できるようになります。
                    </p>
                </div>

                <div class="bg-gray-50/50 p-6 rounded-3xl border border-gray-100">
                    <label class="flex items-center gap-2 text-sm text-gray-600 mb-4 font-light tracking-wide">
                        <i data-lucide="database" class="w-4 h-4"></i>
                        データ管理
                    </label>
                    
                    <div class="flex flex-col gap-3">
                        <button id="export-btn" class="w-full py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-light text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 shadow-sm active:scale-[0.98]">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            <span>レシピをバックアップ</span>
                        </button>
                        
                        <label for="import-input" class="w-full py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-light text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 shadow-sm active:scale-[0.98] cursor-pointer">
                            <i data-lucide="upload" class="w-4 h-4"></i>
                            <span>バックアップを復元</span>
                        </label>
                        <input type="file" id="import-input" accept=".json" class="hidden">
                    </div>

                    <p class="text-xs text-gray-400 mt-6 leading-relaxed font-light">
                        機種変更の際などに、レシピデータをファイルとして保存・復元できます。<br>
                        ※復元すると現在のレシピに統合されます。
                    </p>
                </div>

                <div class="text-center">
                    <p class="text-xs text-gray-400 font-light tracking-widest">Recipick v1.0</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ==================== 削除確認モーダル ==================== -->
    <div id="delete-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/10 backdrop-blur-sm" id="delete-modal-overlay"></div>
        <div class="bg-white rounded-3xl p-8 max-w-[300px] w-full mx-4 shadow-xl transform scale-95 transition-transform duration-300 relative z-10" id="delete-modal-content">
            <h3 class="text-lg font-light text-center mb-3 text-gray-900">削除しますか？</h3>
            <p class="text-xs text-gray-400 text-center mb-8 font-light tracking-wide">この操作は取り消せません</p>
            <div class="flex gap-3">
                <button id="cancel-delete-btn" class="flex-1 py-3 bg-gray-50 text-gray-500 rounded-2xl font-light text-sm hover:bg-gray-100 transition-colors">キャンセル</button>
                <button id="confirm-delete-btn" class="flex-1 py-3 bg-red-50 text-red-500 rounded-2xl font-light text-sm hover:bg-red-100 transition-colors">削除</button>
            </div>
        </div>
    </div>

    <!-- ==================== ボトムナビゲーション ==================== -->
    <nav class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl border-t border-gray-100 pb-safe z-50">
        <div class="flex justify-around items-center pt-2 max-w-2xl mx-auto">
            <button class="nav-btn p-4 flex flex-col items-center gap-1 text-gray-900 transition-colors bg-transparent" data-target="home" data-active="true">
                <i data-lucide="book-open" class="w-5 h-5"></i>
                <span class="text-[10px] tracking-wider font-light">レシピ</span>
            </button>
            <button class="nav-btn p-4 flex flex-col items-center gap-1 text-gray-300 hover:text-gray-900 transition-colors bg-transparent" data-target="add" data-active="false">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span class="text-[10px] tracking-wider font-light">追加</span>
            </button>
            <button class="nav-btn p-4 flex flex-col items-center gap-1 text-gray-300 hover:text-gray-900 transition-colors bg-transparent" data-target="settings" data-active="false">
                <i data-lucide="settings-2" class="w-5 h-5"></i>
                <span class="text-[10px] tracking-wider font-light">設定</span>
            </button>
        </div>
    </nav>

    <script>
        // ==========================================
        // アイコンの軽量・内蔵化（外部通信を排除）
        // ==========================================
        const lucideIcons = {
            'book-open': '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',

        // ==========================================
        // API 連携ロジック (Gemini)
        // ==========================================
        
        function parseRecipeSchema(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const scripts = doc.querySelectorAll('script[type="application/ld+json"]');
            
            let recipeNode = null;
            
            const findRecipe = (obj) => {
                if (!obj) return null;
                if (Array.isArray(obj)) {
                    for (const item of obj) {
                        const res = findRecipe(item);
                        if (res) return res;
                    }
                } else if (typeof obj === 'object') {
                    const type = obj['@type'];
                    if (type === 'Recipe' || (Array.isArray(type) && type.includes('Recipe'))) {
                        return obj;
                    }
                    if (obj['@graph']) {
                        return findRecipe(obj['@graph']);
                    }
                }
                return null;
            };

            for (const script of scripts) {
                try {
                    const json = JSON.parse(script.textContent);
                    recipeNode = findRecipe(json);
                    if (recipeNode) break;
                } catch(e) {}
            }

            if (!recipeNode) return null;

            const title = recipeNode.name || doc.title || "名称不明のレシピ";
            
            let timeStr = "";
            const totalTime = recipeNode.totalTime || recipeNode.prepTime || recipeNode.cookTime;
            if (totalTime && typeof totalTime === 'string') {
                const matchH = totalTime.match(/(\d+)H/);
                const matchM = totalTime.match(/(\d+)M/);
                if (matchH) timeStr += `${matchH[1]}時間`;
                if (matchM) timeStr += `${matchM[1]}分`;
            }

            const ingredients = [];
            if (Array.isArray(recipeNode.recipeIngredient)) {
                recipeNode.recipeIngredient.forEach(ing => {
                    if (typeof ing === 'string') {
                        const parts = ing.trim().split(/\s+(.+)/);
                        if (parts.length > 1) {
                            ingredients.push({ name: parts[0], amount: parts[1] });
                        } else {
                            ingredients.push({ name: ing.trim(), amount: "" });
                        }
                    }
                });
            }

            const instructions = [];
            if (Array.isArray(recipeNode.recipeInstructions)) {
                recipeNode.recipeInstructions.forEach(step => {
                    if (typeof step === 'string') {
                        instructions.push(step.replace(/(<([^>]+)>)/gi, "").trim());
                    } else if (step['@type'] === 'HowToStep' && step.text) {
                        instructions.push(step.text.replace(/(<([^>]+)>)/gi, "").trim());
                    }
                });
            } else if (typeof recipeNode.recipeInstructions === 'string') {
                 instructions.push(recipeNode.recipeInstructions.replace(/(<([^>]+)>)/gi, "").trim());
            }

            if (ingredients.length === 0 || instructions.length === 0) {
                return null;
            }

            return {
                title: title,
                time: timeStr || null,
                ingredients: ingredients,
                instructions: instructions
            };
        }

        async function fetchHtmlWithProxies(targetUrl) {
            const proxies = [
                { url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`, type: 'json' },
                { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`, type: 'text' }
            ];

            for (const proxy of proxies) {
                try {
                    const response = await fetch(proxy.url);
                    if (!response.ok) continue;

                    if (proxy.type === 'json') {
                        const data = await response.json();
                        if (data.contents) return data.contents;
                    } else {
                        const text = await response.text();
                        if (text) return text;
                    }
                } catch (error) {
                    console.warn(`Proxy ${proxy.url} failed:`, error);
                }
            }
            return null;
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        let errorMsg = errorData.error?.message || `HTTP error! status: ${response.status}`;
                        if (response.status === 401 || errorMsg.includes("API key not valid")) {
                            errorMsg = "APIキーが無効、または認証に失敗しました。設定から正しいキーを入力してください。";
                        } else if (response.status === 429 || errorMsg.includes("exceeded your current quota")) {
                            errorMsg = "APIの利用制限（クォータ）を超過しました。";
                        }
                        throw new Error(errorMsg);
                    }
                    return await response.json();
                } catch (e) {
                    if (e.message.includes("APIキーが無効") || e.message.includes("認証に失敗") || e.message.includes("not found") || e.message.includes("not supported") || e.message.includes("クォータ")) {
                        throw e;
                    }
                    if (i === maxRetries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function extractRecipeData(url) {
            const activeApiKey = state.userApiKey;
            const htmlContent = await fetchHtmlWithProxies(url);

            if (!htmlContent) {
                throw new Error("サイトにアクセスできませんでした。URLをご確認いただくか、しばらく経ってから再度お試しください。");
            }

            if (!activeApiKey) {
                const recipeData = parseRecipeSchema(htmlContent);
                if (recipeData) {
                    return recipeData;
                } else {
                    throw new Error("このサイトは標準レシピ形式に対応していません。設定からAPIキーを入力し、AI抽出をお試しください。");
                }
            }

            const doc = new DOMParser().parseFromString(htmlContent, "text/html");
            doc.querySelectorAll('script, style, nav, footer, header, iframe').forEach(el => el.remove());
            const siteText = doc.body.innerText.replace(/\s+/g, ' ').trim().substring(0, 20000);
            
            const prompt = `以下のWebページのテキストから、料理のレシピ情報を抽出してください。\n\nURL: ${url}\n\n【Webページ内容】\n${siteText || "（内容を直接取得できませんでした。URLから推測してください）"}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ 
                        text: "あなたは優秀なアシスタントです。提供されたテキストコンテンツを読み取り、料理のレシピ情報だけを抽出してください。無関係なブログの文章、広告、感想などは全て排除し、タイトル、材料、手順のみを正確に構造化して返してください。" 
                    }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            title: { type: "STRING", description: "料理名" },
                            time: { type: "STRING", description: "調理時間（例: 15分）" },
                            ingredients: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        name: { type: "STRING", description: "材料名" },
                                        amount: { type: "STRING", description: "分量（例: 大さじ1、200g）" }
                                    }
                                }
                            },
                            instructions: {
                                type: "ARRAY",
                                items: { type: "STRING", description: "手順の1ステップ" }
                            }
                        },
                        required: ["title", "ingredients", "instructions"]
                    }
                }
            };

            const modelName = "gemini-3-flash-preview";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeApiKey}`;
            
            const result = await fetchWithRetry(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!textResponse) {
                const finishReason = result.candidates?.[0]?.finishReason;
                throw new Error(`抽出失敗 (${finishReason || "不明な理由"})`);
            }

            try {
                return JSON.parse(textResponse);
            } catch (e) {
                throw new Error("AIがレシピ形式で返答しませんでした。");
            }
        }

            loading.classList.remove('hidden');
            loading.classList.add('flex');
            setTimeout(() => loading.classList.remove('opacity-0'), 10);

            try {
                const recipeData = await extractRecipeData(url);
                
                state.recipes.unshift(recipeData);
                saveState();
                
                inputEl.value = '';
                
                state.currentRecipe = recipeData;
                renderDetail(recipeData);
                switchView('detail');
                showToast('レシピを抽出しました');

            } catch (error) {
                console.error(error);
                showToast(`エラー: ${error.message}`, true);
            } finally {
                loading.classList.add('opacity-0');
                setTimeout(() => {
                    loading.classList.add('hidden');
                    loading.classList.remove('flex');
                    btn.classList.remove('hidden');
                    btn.classList.add('flex');
                }, 300);
            }
        });

        document.getElementById('url-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('extract-btn').click();
            }
        });

        // データ管理（エクスポート）
        document.getElementById('export-btn').addEventListener('click', () => {
            if (state.recipes.length === 0) {
                showToast('バックアップするレシピがありません', true);
                return;
            }
            
            const dataStr = JSON.stringify(state.recipes, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            
            const date = new Date();
            const dateString = `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
            a.download = `recipick_backup_${dateString}.json`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('バックアップをダウンロードしました');
        });

        // データ管理（インポート）
        document.getElementById('import-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (!Array.isArray(importedData)) {
                        throw new Error("フォーマットが違います");
                    }
                    
                    const isValid = importedData.every(item => item.title && item.ingredients && item.instructions);
                    if (!isValid) {
                        throw new Error("レシピデータが正しくありません");
                    }

                    const existingTitles = new Set(state.recipes.map(r => r.title));
                    let addedCount = 0;
                    
                    importedData.forEach(recipe => {
                        if (!existingTitles.has(recipe.title)) {
                            state.recipes.push(recipe);
                            addedCount++;
                        }
                    });

                    if (addedCount > 0) {
                        saveState();
                        showToast(`${addedCount}件のレシピを復元しました`);
                        if (state.view === 'home') {
                            renderHome();
                        }
                    } else {
                        showToast('新しいレシピはありませんでした');
                    }
                    
                    e.target.value = '';

                } catch (error) {
                    console.error(error);
                    showToast('ファイルの読み込みに失敗しました', true);
                    e.target.value = '';
                }
            };
            reader.readAsText(file);
        });

        renderHome();

    </script>
</body>
</html>
