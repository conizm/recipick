<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recipick</title>
    
   <!-- ==================== アイコン・PWA設定 ==================== -->
    <link rel="icon" type="image/svg+xml" href="recipick_logo_favi.png>">
    <link rel="apple-touch-icon" href="recipick_logo_favi.png">
    <meta name="apple-mobile-web-app-title" content="recipick_logo_favi.png">
    <meta name="application-name" content="recipick_logo_favi.png">
    
    <meta property="og:title" content="Recipick">
    <meta property="og:description" content="URLを入れるだけでシンプルなレシピに。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://conizm.cc/recipick/">
    <meta property="og:image" content="https://conizm.cc/recipick/recipick_logo_ogp.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipick">
    <meta name="twitter:description" content="URLを入れるだけでシンプルなレシピに。。">
    <meta name="twitter:image" content="https://conizm.cc/recipick/recipick_logo_ogp.png">
    
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 極限までシンプルでアプリライクなベーススタイル */
        :root {
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Arial, sans-serif;
            background-color: #ffffff;
            color: #111827;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 画面遷移のアニメーション */
        .view-transition {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .hidden-view {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform: translateY(5px);
        }
        .active-view {
            opacity: 1;
            pointer-events: auto;
            position: relative;
            transform: translateY(0);
        }

        /* カスタムスクロールバーを非表示 */
        ::-webkit-scrollbar {
            display: none;
        }

        .pb-safe {
            padding-bottom: calc(1rem + var(--safe-area-bottom));
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden antialiased relative">
    
    <!-- メインコンテンツエリア -->
    <main class="flex-1 overflow-y-auto pb-24 relative" id="app-container">
        
        <!-- ==================== ホーム画面（レシピ一覧） ==================== -->
        <div id="view-home" class="view-transition active-view px-6 py-10 min-h-full max-w-2xl mx-auto">
            <header class="mb-10 flex justify-between items-center">
                <h1 class="text-2xl font-light tracking-wider text-gray-900">レシピ</h1>
            </header>
            
            <div id="recipe-list" class="space-y-4">
                <!-- Javascriptでリストを生成 -->
            </div>
        </div>

        <!-- ==================== 追加画面（URL入力） ==================== -->
        <div id="view-add" class="view-transition hidden-view px-6 py-10 min-h-full flex flex-col max-w-2xl mx-auto mt-10">
            <h1 class="text-2xl font-light tracking-wider mb-4 text-center">Create</h1>
            <p class="text-gray-400 text-sm mb-12 text-center font-light leading-relaxed">
                Paste the URL<br>
            </p>
            
            <div class="w-full relative flex flex-col items-center">
                <input type="url" id="url-input" placeholder="https://..." class="w-full border-b border-gray-200 py-4 px-2 focus:outline-none focus:border-gray-900 bg-transparent text-center text-lg font-light placeholder-gray-300 transition-colors">
                
                <button id="extract-btn" class="mt-10 px-8 py-4 bg-gray-900 text-white rounded-full font-light tracking-widest hover:bg-gray-800 transition-all flex items-center justify-center gap-3 shadow-sm hover:shadow-md active:scale-95">
                                        <span>Pick!</span>
                </button>

                <!-- ローディングインジケーター -->
                <div id="loading-indicator" class="hidden flex-col items-center mt-10 opacity-0 transition-opacity duration-300">
                    <div class="w-8 h-8 border-[1.5px] border-gray-100 border-t-gray-900 rounded-full animate-spin"></div>
                    <p class="text-xs text-gray-400 mt-4 tracking-widest font-light">Now Picking...</p>
                </div>
            </div>
        </div>

        <!-- ==================== 詳細画面（レシピ表示） ==================== -->
        <div id="view-detail" class="view-transition hidden-view px-6 py-8 min-h-full bg-white z-10 max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <button id="back-btn" class="text-gray-400 hover:text-gray-900 transition-colors flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="text-sm tracking-wider font-light">戻る</span>
                </button>
                <button id="delete-btn" class="text-gray-300 hover:text-red-400 transition-colors flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="recipe-detail-content" class="pb-10">
                <!-- Javascriptで詳細コンテンツを生成 -->
            </div>
        </div>

        <!-- ==================== 設定画面 ==================== -->
        <div id="view-settings" class="view-transition hidden-view px-6 py-10 min-h-full max-w-2xl mx-auto">
            <h1 class="text-2xl font-light tracking-wider mb-12 text-center">設定</h1>
            
            <div class="space-y-10">
                <div class="bg-gray-50/50 p-6 rounded-3xl border border-gray-100">
                    <label class="flex items-center gap-2 text-sm text-gray-600 mb-4 font-light tracking-wide">
                        <i data-lucide="key" class="w-4 h-4"></i>
                        Gemini API キー <span class="text-xs text-gray-400 font-normal ml-2">（オプション）</span>
                    </label>
                    <input type="password" id="api-key-input" placeholder="入力してAI連携" class="w-full border-b border-gray-200 py-3 px-1 focus:outline-none focus:border-gray-900 bg-transparent font-light text-gray-800 transition-colors mb-6">
                    
                    <button id="test-api-btn" class="w-full py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-light text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 shadow-sm active:scale-[0.98]">
                        <i data-lucide="check-circle" class="w-4 h-4"></i>
                        <span>AI接続テスト</span>
                    </button>

                    <p class="text-xs text-gray-400 mt-6 leading-relaxed font-light">
                        APIキー未設定時は、サイトの構造データから即座に抽出します（高速・無料）。<br>
                        読み取れないサイトがある場合は、ご自身のAPIキーを入力することで、AIが柔軟に抽出できるようになります。
                    </p>
                </div>

                <div class="bg-gray-50/50 p-6 rounded-3xl border border-gray-100">
                    <label class="flex items-center gap-2 text-sm text-gray-600 mb-4 font-light tracking-wide">
                        <i data-lucide="database" class="w-4 h-4"></i>
                        データ管理
                    </label>
                    
                    <div class="flex flex-col gap-3">
                        <button id="export-btn" class="w-full py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-light text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 shadow-sm active:scale-[0.98]">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            <span>レシピをバックアップ</span>
                        </button>
                        
                        <label for="import-input" class="w-full py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-light text-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 shadow-sm active:scale-[0.98] cursor-pointer">
                            <i data-lucide="upload" class="w-4 h-4"></i>
                            <span>バックアップを復元</span>
                        </label>
                        <input type="file" id="import-input" accept=".json" class="hidden">
                    </div>

                    <p class="text-xs text-gray-400 mt-6 leading-relaxed font-light">
                        機種変更の際などに、レシピデータをファイルとして保存・復元できます。<br>
                        ※復元すると現在のレシピに統合されます。
                    </p>
                </div>

                <div class="text-center">
                    <p class="text-xs text-gray-400 font-light tracking-widest">Recipick v1.0</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ==================== 削除確認モーダル ==================== -->
    <div id="delete-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/10 backdrop-blur-sm" id="delete-modal-overlay"></div>
        <div class="bg-white rounded-3xl p-8 max-w-[300px] w-full mx-4 shadow-xl transform scale-95 transition-transform duration-300 relative z-10" id="delete-modal-content">
            <h3 class="text-lg font-light text-center mb-3 text-gray-900">削除しますか？</h3>
            <p class="text-xs text-gray-400 text-center mb-8 font-light tracking-wide">この操作は取り消せません</p>
            <div class="flex gap-3">
                <button id="cancel-delete-btn" class="flex-1 py-3 bg-gray-50 text-gray-500 rounded-2xl font-light text-sm hover:bg-gray-100 transition-colors">キャンセル</button>
                <button id="confirm-delete-btn" class="flex-1 py-3 bg-red-50 text-red-500 rounded-2xl font-light text-sm hover:bg-red-100 transition-colors">削除</button>
            </div>
        </div>
    </div>

    <!-- ==================== ボトムナビゲーション ==================== -->
    <nav class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl border-t border-gray-100 pb-safe z-50">
        <div class="flex justify-around items-center pt-2 max-w-2xl mx-auto">
            <button class="nav-btn p-4 flex flex-col items-center gap-1 text-gray-900 transition-colors" data-target="home" data-active="true">
                <i data-lucide="book-open" class="w-5 h-5"></i>
                <span class="text-[10px] tracking-wider font-light">レシピ</span>
            </button>
            <button class="nav-btn p-4 flex flex-col items-center gap-1 text-gray-300 hover:text-gray-900 transition-colors" data-target="add" data-active="false">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span class="text-[10px] tracking-wider font-light">追加</span>
            </button>
            <button class="nav-btn p-4 flex flex-col items-center gap-1 text-gray-300 hover:text-gray-900 transition-colors" data-target="settings" data-active="false">
                <i data-lucide="settings-2" class="w-5 h-5"></i>
                <span class="text-[10px] tracking-wider font-light">設定</span>
            </button>
        </div>
    </nav>

    <script>
        // ==========================================
        // アプリケーションの状態管理
        // ==========================================
        const state = {
            view: 'home',
            recipes: JSON.parse(localStorage.getItem('recipick_recipes') || '[]'),
            currentRecipe: null,
            userApiKey: localStorage.getItem('recipick_api_key') || ''
        };

        // ローカルストレージへの保存
        function saveState() {
            localStorage.setItem('recipick_recipes', JSON.stringify(state.recipes));
        }

        // アイコンの初期化
        lucide.createIcons();

        // ==========================================
        // UI操作関数
        // ==========================================
        
        // トースト通知
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm font-light z-[150] transition-all duration-500 shadow-sm transform -translate-y-4 opacity-0 ${isError ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-gray-900 text-white'}`;
            toast.innerText = message;
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('-translate-y-4', 'opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('-translate-y-4', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // 画面の切り替え
        function switchView(viewId) {
            document.querySelectorAll('.view-transition').forEach(el => {
                el.classList.remove('active-view');
                el.classList.add('hidden-view');
            });
            
            const nextView = document.getElementById(`view-${viewId}`);
            nextView.classList.remove('hidden-view');
            nextView.classList.add('active-view');
            
            if (viewId !== 'detail') {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    if(btn.dataset.target === viewId) {
                        btn.dataset.active = "true";
                        btn.classList.replace('text-gray-300', 'text-gray-900');
                    } else {
                        btn.dataset.active = "false";
                        btn.classList.replace('text-gray-900', 'text-gray-300');
                    }
                });
            }

            document.getElementById('app-container').scrollTop = 0;
            state.view = viewId;

            if (viewId === 'home') renderHome();
        }

        // 削除モーダル操作
        const deleteModal = document.getElementById('delete-modal');
        const deleteModalContent = document.getElementById('delete-modal-content');

        function showDeleteModal() {
            deleteModal.classList.remove('hidden');
            requestAnimationFrame(() => {
                deleteModal.classList.remove('opacity-0');
                deleteModalContent.classList.remove('scale-95');
                deleteModalContent.classList.add('scale-100');
            });
        }

        function hideDeleteModal() {
            deleteModal.classList.add('opacity-0');
            deleteModalContent.classList.remove('scale-100');
            deleteModalContent.classList.add('scale-95');
            setTimeout(() => {
                deleteModal.classList.add('hidden');
            }, 300);
        }

        // ==========================================
        // レンダリング関数
        // ==========================================

        function renderHome() {
            const list = document.getElementById('recipe-list');
            
            if (state.recipes.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center pt-24 pb-10 text-gray-300">
                        <i data-lucide="book-dashed" class="w-12 h-12 mb-4 stroke-[1]"></i>
                        <p class="text-center text-sm font-light leading-relaxed">
                            レシピはまだありません。<br>下の「追加」から読み込みましょう。
                        </p>
                    </div>`;
                lucide.createIcons();
                return;
            }
            
            list.innerHTML = state.recipes.map((r, i) => `
                <div class="p-6 border border-gray-100 rounded-[2rem] cursor-pointer transition-all bg-white flex flex-col gap-3 recipe-card shadow-[0_2px_10px_-4px_rgba(0,0,0,0.02)] active:scale-[0.98]" data-index="${i}">
                    <h3 class="text-lg font-normal text-gray-800 line-clamp-2 leading-snug tracking-wide">${r.title}</h3>
                    <div class="flex items-center gap-4">
                        ${r.time ? `<span class="text-xs text-gray-400 flex items-center gap-1.5 font-light"><i data-lucide="clock" class="w-3.5 h-3.5"></i>${r.time}</span>` : ''}
                        <span class="text-xs text-gray-400 font-light flex items-center gap-1.5"><i data-lucide="list" class="w-3.5 h-3.5"></i>${r.ingredients.length}種の材料</span>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
            
            document.querySelectorAll('.recipe-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const idx = e.currentTarget.dataset.index;
                    state.currentRecipe = state.recipes[idx];
                    renderDetail(state.currentRecipe);
                    switchView('detail');
                });
            });
        }

        function renderDetail(recipe) {
            const container = document.getElementById('recipe-detail-content');
            
            const ingredientsHtml = recipe.ingredients.map(ing => `
                <div class="flex justify-between items-end py-3 border-b border-gray-100 border-dashed last:border-0 group">
                    <span class="text-gray-800 text-sm md:text-base">${ing.name}</span>
                    <span class="text-gray-500 font-light text-sm bg-white pl-2">${ing.amount}</span>
                </div>
            `).join('');

            const instructionsHtml = recipe.instructions.map((inst, idx) => `
                <div class="flex gap-5 mb-8 group">
                    <span class="text-gray-300 font-light text-xl md:text-2xl pt-0.5 select-none">${String(idx + 1).padStart(2, '0')}</span>
                    <p class="text-gray-700 leading-loose text-sm md:text-base flex-1">${inst}</p>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="mb-10">
                    <h1 class="text-2xl md:text-3xl font-light mb-4 leading-tight text-gray-900">${recipe.title}</h1>
                    ${recipe.time ? `<p class="text-gray-400 text-sm flex items-center gap-2 font-light"><i data-lucide="clock" class="w-4 h-4"></i>目安: ${recipe.time}</p>` : ''}
                </div>
                
                <div class="mb-12">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-1 h-4 bg-gray-900 rounded-full"></div>
                        <h2 class="text-sm tracking-widest text-gray-500 font-medium">材料</h2>
                    </div>
                    <div class="bg-gray-50/50 rounded-3xl p-6 md:p-8 border border-gray-100">
                        ${ingredientsHtml}
                    </div>
                </div>

                <div>
                    <div class="flex items-center gap-2 mb-8">
                        <div class="w-1 h-4 bg-gray-900 rounded-full"></div>
                        <h2 class="text-sm tracking-widest text-gray-500 font-medium">手順</h2>
                    </div>
                    <div class="pl-2 pr-2">
                        ${instructionsHtml}
                    </div>
                </div>
                
                <div class="mt-16 flex justify-center">
                   <div class="w-12 h-1 bg-gray-100 rounded-full"></div>
                </div>
            `;
            lucide.createIcons();
        }

        // ==========================================
        // API 連携ロジック (Gemini)
        // ==========================================
        
        function parseRecipeSchema(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const scripts = doc.querySelectorAll('script[type="application/ld+json"]');
            
            let recipeNode = null;
            
            const findRecipe = (obj) => {
                if (!obj) return null;
                if (Array.isArray(obj)) {
                    for (const item of obj) {
                        const res = findRecipe(item);
                        if (res) return res;
                    }
                } else if (typeof obj === 'object') {
                    const type = obj['@type'];
                    if (type === 'Recipe' || (Array.isArray(type) && type.includes('Recipe'))) {
                        return obj;
                    }
                    if (obj['@graph']) {
                        return findRecipe(obj['@graph']);
                    }
                }
                return null;
            };

            for (const script of scripts) {
                try {
                    const json = JSON.parse(script.textContent);
                    recipeNode = findRecipe(json);
                    if (recipeNode) break;
                } catch(e) {}
            }

            if (!recipeNode) return null;

            const title = recipeNode.name || doc.title || "名称不明のレシピ";
            
            let timeStr = "";
            const totalTime = recipeNode.totalTime || recipeNode.prepTime || recipeNode.cookTime;
            if (totalTime && typeof totalTime === 'string') {
                const matchH = totalTime.match(/(\d+)H/);
                const matchM = totalTime.match(/(\d+)M/);
                if (matchH) timeStr += `${matchH[1]}時間`;
                if (matchM) timeStr += `${matchM[1]}分`;
            }

            const ingredients = [];
            if (Array.isArray(recipeNode.recipeIngredient)) {
                recipeNode.recipeIngredient.forEach(ing => {
                    if (typeof ing === 'string') {
                        const parts = ing.trim().split(/\s+(.+)/);
                        if (parts.length > 1) {
                            ingredients.push({ name: parts[0], amount: parts[1] });
                        } else {
                            ingredients.push({ name: ing.trim(), amount: "" });
                        }
                    }
                });
            }

            const instructions = [];
            if (Array.isArray(recipeNode.recipeInstructions)) {
                recipeNode.recipeInstructions.forEach(step => {
                    if (typeof step === 'string') {
                        instructions.push(step.replace(/(<([^>]+)>)/gi, "").trim());
                    } else if (step['@type'] === 'HowToStep' && step.text) {
                        instructions.push(step.text.replace(/(<([^>]+)>)/gi, "").trim());
                    }
                });
            } else if (typeof recipeNode.recipeInstructions === 'string') {
                 instructions.push(recipeNode.recipeInstructions.replace(/(<([^>]+)>)/gi, "").trim());
            }

            if (ingredients.length === 0 || instructions.length === 0) {
                return null;
            }

            return {
                title: title,
                time: timeStr || null,
                ingredients: ingredients,
                instructions: instructions
            };
        }

        async function fetchHtmlWithProxies(targetUrl) {
            const proxies = [
                { url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`, type: 'json' },
                { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`, type: 'text' }
            ];

            for (const proxy of proxies) {
                try {
                    const response = await fetch(proxy.url);
                    if (!response.ok) continue;

                    if (proxy.type === 'json') {
                        const data = await response.json();
                        if (data.contents) return data.contents;
                    } else {
                        const text = await response.text();
                        if (text) return text;
                    }
                } catch (error) {
                    console.warn(`Proxy ${proxy.url} failed:`, error);
                }
            }
            return null;
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        let errorMsg = errorData.error?.message || `HTTP error! status: ${response.status}`;
                        if (response.status === 401 || errorMsg.includes("API key not valid")) {
                            errorMsg = "APIキーが無効、または認証に失敗しました。設定から正しいキーを入力してください。";
                        } else if (response.status === 429 || errorMsg.includes("exceeded your current quota")) {
                            errorMsg = "APIの利用制限（クォータ）を超過しました。";
                        }
                        throw new Error(errorMsg);
                    }
                    return await response.json();
                } catch (e) {
                    if (e.message.includes("APIキーが無効") || e.message.includes("認証に失敗") || e.message.includes("not found") || e.message.includes("not supported") || e.message.includes("クォータ")) {
                        throw e;
                    }
                    if (i === maxRetries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function extractRecipeData(url) {
            const activeApiKey = state.userApiKey;
            const htmlContent = await fetchHtmlWithProxies(url);

            if (!htmlContent) {
                throw new Error("サイトにアクセスできませんでした。URLをご確認いただくか、しばらく経ってから再度お試しください。");
            }

            if (!activeApiKey) {
                const recipeData = parseRecipeSchema(htmlContent);
                if (recipeData) {
                    return recipeData;
                } else {
                    throw new Error("このサイトは標準レシピ形式に対応していません。設定からAPIキーを入力し、AI抽出をお試しください。");
                }
            }

            const doc = new DOMParser().parseFromString(htmlContent, "text/html");
            doc.querySelectorAll('script, style, nav, footer, header, iframe').forEach(el => el.remove());
            const siteText = doc.body.innerText.replace(/\s+/g, ' ').trim().substring(0, 20000);
            
            const prompt = `以下のWebページのテキストから、料理のレシピ情報を抽出してください。\n\nURL: ${url}\n\n【Webページ内容】\n${siteText || "（内容を直接取得できませんでした。URLから推測してください）"}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ 
                        text: "あなたは優秀なアシスタントです。提供されたテキストコンテンツを読み取り、料理のレシピ情報だけを抽出してください。無関係なブログの文章、広告、感想などは全て排除し、タイトル、材料、手順のみを正確に構造化して返してください。" 
                    }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            title: { type: "STRING", description: "料理名" },
                            time: { type: "STRING", description: "調理時間（例: 15分）" },
                            ingredients: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        name: { type: "STRING", description: "材料名" },
                                        amount: { type: "STRING", description: "分量（例: 大さじ1、200g）" }
                                    }
                                }
                            },
                            instructions: {
                                type: "ARRAY",
                                items: { type: "STRING", description: "手順の1ステップ" }
                            }
                        },
                        required: ["title", "ingredients", "instructions"]
                    }
                }
            };

            const modelName = "gemini-3-flash-preview";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeApiKey}`;
            
            const result = await fetchWithRetry(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!textResponse) {
                const finishReason = result.candidates?.[0]?.finishReason;
                throw new Error(`抽出失敗 (${finishReason || "不明な理由"})`);
            }

            try {
                return JSON.parse(textResponse);
            } catch (e) {
                throw new Error("AIがレシピ形式で返答しませんでした。");
            }
        }

        // ==========================================
        // イベントリスナーの設定
        // ==========================================

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const target = e.currentTarget.dataset.target;
                if (state.view !== target) {
                    switchView(target);
                }
            });
        });

        document.getElementById('back-btn').addEventListener('click', () => {
            switchView('home');
        });

        // 削除機能のイベントリスナー
        document.getElementById('delete-btn').addEventListener('click', showDeleteModal);
        document.getElementById('cancel-delete-btn').addEventListener('click', hideDeleteModal);
        document.getElementById('delete-modal-overlay').addEventListener('click', hideDeleteModal);
        
        document.getElementById('confirm-delete-btn').addEventListener('click', () => {
            if (state.currentRecipe) {
                const index = state.recipes.findIndex(r => r === state.currentRecipe);
                if (index > -1) {
                    state.recipes.splice(index, 1);
                    saveState();
                    hideDeleteModal();
                    
                    // アニメーションが完了するのを少し待ってからホームに戻る
                    setTimeout(() => {
                        switchView('home');
                        showToast('レシピを削除しました');
                        state.currentRecipe = null;
                    }, 200);
                }
            }
        });

        const apiKeyInput = document.getElementById('api-key-input');
        apiKeyInput.value = state.userApiKey;
        apiKeyInput.addEventListener('input', (e) => {
            state.userApiKey = e.target.value.trim();
            localStorage.setItem('recipick_api_key', state.userApiKey);
        });

        document.getElementById('test-api-btn').addEventListener('click', async () => {
            const apiKey = state.userApiKey;
            if (!apiKey) {
                showToast('APIキーを入力してください', true);
                return;
            }

            const btn = document.getElementById('test-api-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<div class="w-4 h-4 border-[1.5px] border-gray-400 border-t-gray-700 rounded-full animate-spin"></div><span>確認中...</span>';
            btn.disabled = true;

            try {
                const modelName = "gemini-3-flash-preview";
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Hello" }] }]
                    })
                });

                if (response.ok) {
                    showToast('有効なAPIキーです！接続に成功しました。');
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    let errorMsg = "接続に失敗しました。";
                    if (response.status === 401 || errorData.error?.message?.includes("API key not valid")) {
                        errorMsg = "APIキーが無効です。";
                    } else if (response.status === 429) {
                        errorMsg = "APIの利用制限を超過しています。";
                    } else if (response.status === 404 || errorData.error?.message?.includes("not found")) {
                        errorMsg = "指定したモデル(gemini-3-flash-preview)が現在のアカウントで利用できません。";
                    }
                    showToast(errorMsg, true);
                }
            } catch (error) {
                showToast('通信エラーが発生しました', true);
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                lucide.createIcons();
            }
        });

        document.getElementById('extract-btn').addEventListener('click', async () => {
            const inputEl = document.getElementById('url-input');
            const url = inputEl.value.trim();
            
            if (!url) {
                showToast('URLを入力してください', true);
                return;
            }

            try {
                new URL(url);
            } catch (_) {
                showToast('正しいURL形式で入力してください', true);
                return;
            }

            const btn = document.getElementById('extract-btn');
            const loading = document.getElementById('loading-indicator');

            btn.classList.add('hidden');
            btn.classList.remove('flex');
            loading.classList.remove('hidden');
            loading.classList.add('flex');
            setTimeout(() => loading.classList.remove('opacity-0'), 10);

            try {
                const recipeData = await extractRecipeData(url);
                
                state.recipes.unshift(recipeData);
                saveState();
                
                inputEl.value = '';
                
                state.currentRecipe = recipeData;
                renderDetail(recipeData);
                switchView('detail');
                showToast('レシピを抽出しました');

            } catch (error) {
                console.error(error);
                showToast(`エラー: ${error.message}`, true);
            } finally {
                loading.classList.add('opacity-0');
                setTimeout(() => {
                    loading.classList.add('hidden');
                    loading.classList.remove('flex');
                    btn.classList.remove('hidden');
                    btn.classList.add('flex');
                }, 300);
            }
        });

        document.getElementById('url-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('extract-btn').click();
            }
        });

        // データ管理（エクスポート）
        document.getElementById('export-btn').addEventListener('click', () => {
            if (state.recipes.length === 0) {
                showToast('バックアップするレシピがありません', true);
                return;
            }
            
            const dataStr = JSON.stringify(state.recipes, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            
            const date = new Date();
            const dateString = `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
            a.download = `recipick_backup_${dateString}.json`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('バックアップをダウンロードしました');
        });

        // データ管理（インポート）
        document.getElementById('import-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (!Array.isArray(importedData)) {
                        throw new Error("フォーマットが違います");
                    }
                    
                    const isValid = importedData.every(item => item.title && item.ingredients && item.instructions);
                    if (!isValid) {
                        throw new Error("レシピデータが正しくありません");
                    }

                    const existingTitles = new Set(state.recipes.map(r => r.title));
                    let addedCount = 0;
                    
                    importedData.forEach(recipe => {
                        if (!existingTitles.has(recipe.title)) {
                            state.recipes.push(recipe);
                            addedCount++;
                        }
                    });

                    if (addedCount > 0) {
                        saveState();
                        showToast(`${addedCount}件のレシピを復元しました`);
                        if (state.view === 'home') {
                            renderHome();
                        }
                    } else {
                        showToast('新しいレシピはありませんでした');
                    }
                    
                    e.target.value = '';

                } catch (error) {
                    console.error(error);
                    showToast('ファイルの読み込みに失敗しました', true);
                    e.target.value = '';
                }
            };
            reader.readAsText(file);
        });

        renderHome();

    </script>
</body>
</html>
